<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperWords – Book Quote Poster Maker</title>
  <link rel="icon" type="image/png" href="favicon.svg" />

  <!-- =============================================
       FONTS
       Using: Playfair Display (editorial serif) + DM Sans (clean body) + Fraunces (deco quote mark)
       Change these @import URLs to swap fonts
  ============================================= -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,600;1,600&family=DM+Sans:wght@300;400;500&family=Plus+Jakarta+Sans:wght@300;400;500&family=Syne:wght@400;700&family=Fraunces:ital,wght@1,900&display=swap"
  rel="stylesheet"/>

  <!-- =============================================
       GLOBAL STYLES & CSS VARIABLES
       Edit colors, fonts, and spacing here
  ============================================= -->
  <style>
    /* ---------- COLOR TOKENS ---------- */
    :root {
      --bg: #F5F0E8;
      /* warm paper background */
      --surface: #FDFAF4;
      /* card/modal surface */
      --ink: #1A1208;
      /* primary text */
      --ink-muted: #7A6E5F;
      /* secondary/placeholder text */
      --accent: #C2400C;
      /* primary CTA — burnt orange */
      --accent-hover: #9D3109;
      /* hover state for CTA */
      --border: #DDD4C0;
      /* subtle borders */
      --shadow: rgba(26, 18, 8, 0.12);
    }

    /* ---------- RESET ---------- */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    /* ---------- BASE ---------- */
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* =============================================
         LANDING PAGE — HEADER / HERO
    ============================================= */
    header {
      text-align: center;
      padding: 64px 24px 40px;
      max-width: 640px;
      width: 100%;
    }

    header .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 16px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      line-height: 1.12;
      font-weight: 700;
      margin-bottom: 16px;
    }

    header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    header p {
      font-size: 1rem;
      color: var(--ink-muted);
      line-height: 1.7;
    }

    /* =============================================
         LANDING PAGE — INPUT FORM CARD
    ============================================= */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 560px;
      width: calc(100% - 48px);
      box-shadow: 0 4px 32px var(--shadow);
      margin-bottom: 80px;
    }

    /* ---------- TWO-COLUMN ROW (Book + Author) ---------- */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 420px) {
      .field-row {
        grid-template-columns: 1fr;
      }
    }

    /* ---------- TWO-COLUMN ROW (Book + Author side by side) ---------- */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    /* Stack on very small screens */
    @media (max-width: 420px) {
      .field-row {
        grid-template-columns: 1fr;
      }
    }

    /* ---------- FIELD GROUP ---------- */
    .field-group {
      margin-bottom: 24px;
    }

    .field-group label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--ink-muted);
      margin-bottom: 8px;
    }

    /* ---------- INPUT & TEXTAREA ---------- */
    .field-group input,
    .field-group textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      resize: vertical;
    }

    .field-group input::placeholder,
    .field-group textarea::placeholder {
      color: var(--ink-muted);
      opacity: 0.7;
    }

    /* Focus ring */
    .field-group input:focus,
    .field-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(194, 64, 12, 0.12);
    }

    .field-group textarea {
      min-height: 120px;
      line-height: 1.6;
    }

    /* ---------- CHAR COUNTER (for the quote field) ---------- */
    .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: var(--ink-muted);
      margin-top: 4px;
    }

    /* =============================================
         GENERATE BUTTON
         Edit button color via --accent in :root
    ============================================= */
    .btn-generate {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(194, 64, 12, 0.25);
      margin-top: 8px;
    }

    .btn-generate:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 20px rgba(194, 64, 12, 0.35);
    }

    .btn-generate:active {
      transform: scale(0.98);
    }

    /* =============================================
         MODAL OVERLAY
         The preview popup that appears after "Generate"
    ============================================= */
    .modal-overlay {
      display: none;
      /* hidden by default */
      position: fixed;
      inset: 0;
      background: rgba(26, 18, 8, 0.55);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.2s ease;
    }

    .modal-overlay.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* ---------- MODAL CARD ---------- */
    .modal-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 40px 36px 32px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(26, 18, 8, 0.25);
      animation: slideUp 0.25s ease;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Close button (×) in modal top-right */
    .modal-close {
      position: absolute;
      top: 16px;
      right: 18px;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--ink-muted);
      line-height: 1;
      transition: color 0.15s;
    }

    .modal-close:hover {
      color: var(--ink);
    }

    .modal-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 20px;
    }

    /* =============================================
         POSTER PREVIEW CANVAS
         This is the visual poster that gets exported.
         Edit poster dimensions, colors, and typography here.
    ============================================= */
    #poster-preview {
      /* Height is auto — grows with quote length. Min height keeps short quotes from looking tiny. */
      width: 100%;
      min-height: 240px;
      /* minimum poster height — increase for a taller floor */
      background: #1A1208;
      /* set dynamically by JS on each Generate — edit POSTER_PALETTES in the script */
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      /* left-align children */
      justify-content: flex-start;
      /* flow from top, not centred */
      padding: 56px 44px 48px;
      /* more top padding to clear the deco quote mark */
      position: relative;
      overflow: hidden;
      text-align: left;
      /* left-align all text */
      margin-bottom: 24px;
    }

    /* Decorative corner marks on the poster */
    #poster-preview::before,
    #poster-preview::after {
      content: '';
      position: absolute;
      width: 36px;
      height: 36px;
      border-color: rgba(255, 255, 255, 0.18);
      border-style: solid;
    }

    #poster-preview::before {
      top: 20px;
      left: 20px;
      border-width: 1.5px 0 0 1.5px;
    }

    #poster-preview::after {
      bottom: 20px;
      right: 20px;
      border-width: 0 1.5px 1.5px 0;
    }

    /* Opening quotation mark decoration
       Font: Fraunces Italic 900 — a chunky, expressive serif.
       Change font-family here to swap it out. */
    .poster-deco {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 900;
      font-size: 9rem;
      /* larger because Fraunces is optically smaller */
      line-height: 1;
      color: rgba(255, 255, 255, 0.13);
      position: absolute;
      top: 12px;
      left: 28px;
      user-select: none;
      letter-spacing: -0.02em;
    }

    /* The actual quote text on the poster */
    .poster-quote {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 3.5vw, 1.35rem);
      color: #F5F0E8;
      line-height: 1.7;
      font-style: italic;
      position: relative;
      z-index: 1;
      margin-bottom: 28px;
      width: 100%;
      /* stretch full width so text wraps correctly */
      margin-top: 32px;
      /* breathing room below the deco mark */
    }

    /* Thin horizontal rule between quote and attribution */
    .poster-rule {
      width: 40px;
      height: 1px;
      background: rgba(255, 255, 255, 0.3);
      margin: 0 0 20px;
      /* left-aligned — was "0 auto 20px" when centred */
    }

    /* Book title and author on the poster */
    .poster-attribution {
      color: rgba(255, 255, 255, 0.65);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1.8;
      text-align: left;
      /* explicit left-align */
      width: 100%;
    }

    .poster-attribution strong {
      display: block;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 500;
    }

    /* =============================================
         DOWNLOAD BUTTON (CTA inside modal)
         Edit button text, color, and behavior here
    ============================================= */
    .btn-download {
      width: 100%;
      padding: 15px;
      background: #C2400C;
      color: var(--bg);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-download:hover {
      background: #9D3109;
    }

    .btn-download:active {
      transform: scale(0.98);
    }

    /* Download icon SVG inside the button */
    .btn-download svg {
      flex-shrink: 0;
    }

    /* =============================================
         FOOTER
    ============================================= */
    footer {
      margin-top: auto;
      padding: 20px 24px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--ink-muted);
    }

    footer a {
      color: var(--ink-muted);
      text-decoration: underline;
      text-underline-offset: 3px;
      font-style: italic;
    }

    footer a:hover {
      color: var(--ink);
    }

    /* =============================================
         RESPONSIVE TWEAKS
    ============================================= */
    @media (max-width: 480px) {
      .form-card {
        padding: 28px 20px;
      }

      .modal-card {
        padding: 32px 20px 24px;
      }

      #poster-preview {
        padding: 36px 28px;
      }
    }
  </style>
</head>

<body>

  <!-- =============================================
       LANDING PAGE — HERO HEADER
       Edit headline and subtitle copy here
  ============================================= -->
  <header>
    <p class="eyebrow">Book Quote Poster Maker</p>
    <h1>Turn words into <em>art.</em></h1>
    <p>Because some words deserve more than a screenshot</p>
  </header>

  <!-- =============================================
       LANDING PAGE — INPUT FORM
       3 fields: Book Name, Author, Quote
  ============================================= -->
  <main style="width:100%; display:flex; flex-direction:column; align-items:center;">
    <div class="form-card">

      <!-- Fields 1 & 2: Book + Author side by side (matches wireframe) -->
      <div class="field-row">
        <div class="field-group" style="margin-bottom:0">
          <label for="book-name">Book Title</label>
          <input type="text" id="book-name" placeholder="e.g. Meditations" maxlength="80" />
        </div>
        <div class="field-group" style="margin-bottom:0">
          <label for="author-name">Author</label>
          <input type="text" id="author-name" placeholder="e.g. Marcus Aurelius" maxlength="60" />
        </div>
      </div>

      <!-- Field 3: Quote Text -->
      <div class="field-group">
        <label for="quote-text">Quote</label>
        <textarea id="quote-text" placeholder="Paste the quote you love..." maxlength="400"
          oninput="updateCharCount(this)"></textarea>
        <!-- Character counter — updates live via JS -->
        <p class="char-count" id="char-count">0 / 400</p>
      </div>

      <!-- Generate Button -->
      <button class="btn-generate" onclick="generatePoster()">
        Generate Poster →
      </button>

    </div>
  </main>

  <!-- =============================================
       FOOTER
       Edit footer text here
  ============================================= -->
  <footer>PaperWords · Made with care by <a href="https://sharmaprakhar.framer.website" target="_blank">Prakhar</a>
  </footer>

  <!-- =============================================
       MODAL — POSTER PREVIEW & DOWNLOAD
       Hidden by default. Shown after "Generate" click.
       Edit poster visual styles in CSS above (#poster-preview)
  ============================================= -->
  <div class="modal-overlay" id="modal" onclick="closeOnBackdrop(event)">
    <div class="modal-card">

      <!-- Close button -->
      <button class="modal-close" onclick="closeModal()" aria-label="Close">×</button>

      <p class="modal-label">Your Poster Preview</p>

      <!-- POSTER CANVAS — this is what gets exported as PNG -->
      <div id="poster-preview">
        <!-- Decorative large quote mark -->
        <span class="poster-deco" aria-hidden="true">"</span>

        <!-- Quote text — filled by JS -->
        <p class="poster-quote" id="preview-quote"></p>

        <!-- Divider line -->
        <div class="poster-rule"></div>

        <!-- Book + Author attribution — filled by JS -->
        <p class="poster-attribution">
          <strong id="preview-book"></strong>
          <span id="preview-author"></span>
        </p>
      </div>


      <!-- FONT PICKER -->
      <div id="font-picker-row" style="margin-bottom:10px;">
        <p style="font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;
          color:var(--ink-muted);font-weight:500;margin-bottom:8px;">Quote Font</p>
        <div id="font-pills" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
      </div>

      
      <!-- =============================================
           CUSTOM COLOUR PICKER
           Colour swatch + hex input that apply directly to the poster.
           Edit the label text or input placeholder here.
      ============================================= -->
      <div id="custom-colour-row" style="
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        background: var(--bg);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
      ">
        <!-- Colour wheel picker — clicking the swatch opens native OS colour picker -->
        <label for="colour-picker" style="
          font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase;
          color:var(--ink-muted); font-weight:500; white-space:nowrap; cursor:pointer;
        ">Custom colour</label>

        <!-- Native colour input — hidden, triggered by the swatch below -->
        <input type="color" id="colour-picker" value="#FF006E" oninput="onPickerChange(this.value)"
          style="width:0;height:0;opacity:0;position:absolute;pointer-events:none;" />

        <!-- Visual colour swatch — click to open picker -->
        <div id="colour-swatch" onclick="document.getElementById('colour-picker').click()" style="
          width: 32px; height: 32px; min-width: 32px;
          border-radius: 6px;
          background: #FF006E;
          cursor: pointer;
          border: 1.5px solid var(--border);
          transition: transform 0.15s;
        " title="Click to open colour picker" onmouseover="this.style.transform='scale(1.1)'"
          onmouseout="this.style.transform='scale(1)'">
        </div>

        <!-- Hex code text input — type a hex code directly -->
        <input type="text" id="hex-input" value="#FF006E" maxlength="7" placeholder="#000000"
          oninput="onHexInput(this.value)" style="
            flex:1; background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 8px; padding: 7px 10px;
            font-family: 'DM Sans', monospace; font-size: 0.88rem;
            color: var(--ink); outline: none; transition: border-color 0.2s;
          " onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'" />

        <!-- Apply button -->
        <button onclick="applyCustomColour()" style="
          padding: 8px 14px; background: var(--accent); color: #fff;
          border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
          font-size: 0.82rem; font-weight: 500; cursor: pointer;
          transition: background 0.2s; white-space: nowrap;
        " onmouseover="this.style.background='var(--accent-hover)'" onmouseout="this.style.background='var(--accent)'">
          Apply
        </button>
      </div>

      <!-- Reshuffle colour button — picks a new random palette without closing the modal -->
      <button class="btn-reshuffle" onclick="applyPalette()" style="
        width:100%; padding:11px; margin-bottom:10px;
        background: transparent; border: 1.5px solid var(--border);
        border-radius:10px; font-family:'DM Sans',sans-serif;
        font-size:0.9rem; font-weight:500; color:var(--ink-muted);
        cursor:pointer; transition:border-color 0.2s,color 0.2s;
        letter-spacing:0.03em;
      " onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--ink-muted)'">
        ↻ &nbsp;Try another colour
      </button>

      <!-- Download CTA Button -->
      <button class="btn-download" onclick="downloadPoster()">
        <!-- Download icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Download as PNG
      </button>

    </div>
  </div>

  <!-- =============================================
       html2canvas — used to convert the poster div to PNG
       CDN source: cdnjs.cloudflare.com
       If offline, replace with a local copy
  ============================================= -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- =============================================
       JAVASCRIPT
       All interactive logic lives here.
       Functions are clearly labelled for easy editing.
  ============================================= -->
  <script>

    /* --------------------------------------------------
       updateCharCount()
       Called on every keystroke in the quote textarea.
       Updates the "X / 400" counter below the field.
    -------------------------------------------------- */
    function updateCharCount(el) {
      const count = el.value.length;
      document.getElementById('char-count').textContent = count + ' / 400';
    }


    /* --------------------------------------------------
       generatePoster()
       Reads form values, validates them,
       injects them into the modal poster, and opens it.
    -------------------------------------------------- */
    /* --------------------------------------------------
       POSTER_PALETTES
       Each entry is a solid background color + matching text colors.
       Add, remove, or edit entries to change the poster color options.
       Format: { gradient (solid hex), quoteColor, metaColor, decoColor, ruleColor }
    -------------------------------------------------- */
    /* POSTER_PALETTES — solid background colors only.
       Add/remove entries freely. Use dark bg = white text, light bg = dark text. */
    const POSTER_PALETTES = [
      { gradient: '#FF006E', quoteColor: '#fff', metaColor: 'rgba(255,255,255,0.7)', decoColor: 'rgba(255,255,255,0.12)', ruleColor: 'rgba(255,255,255,0.35)' },
      { gradient: '#8338EC', quoteColor: '#fff', metaColor: 'rgba(255,255,255,0.7)', decoColor: 'rgba(255,255,255,0.12)', ruleColor: 'rgba(255,255,255,0.35)' },
      { gradient: '#FB5607', quoteColor: '#fff', metaColor: 'rgba(255,255,255,0.7)', decoColor: 'rgba(255,255,255,0.12)', ruleColor: 'rgba(255,255,255,0.35)' },
      { gradient: '#FFBE0B', quoteColor: '#1A0A00', metaColor: 'rgba(0,0,0,0.5)', decoColor: 'rgba(0,0,0,0.1)', ruleColor: 'rgba(0,0,0,0.2)' },
      { gradient: '#3A86FF', quoteColor: '#fff', metaColor: 'rgba(255,255,255,0.7)', decoColor: 'rgba(255,255,255,0.12)', ruleColor: 'rgba(255,255,255,0.35)' },
      { gradient: '#06D6A0', quoteColor: '#0A1F1A', metaColor: 'rgba(0,0,0,0.5)', decoColor: 'rgba(0,0,0,0.1)', ruleColor: 'rgba(0,0,0,0.2)' },
      { gradient: '#EF233C', quoteColor: '#fff', metaColor: 'rgba(255,255,255,0.7)', decoColor: 'rgba(255,255,255,0.12)', ruleColor: 'rgba(255,255,255,0.35)' },
      { gradient: '#0077B6', quoteColor: '#fff', metaColor: 'rgba(255,255,255,0.7)', decoColor: 'rgba(255,255,255,0.12)', ruleColor: 'rgba(255,255,255,0.35)' },
      { gradient: '#007F5F', quoteColor: '#fff', metaColor: 'rgba(255,255,255,0.7)', decoColor: 'rgba(255,255,255,0.12)', ruleColor: 'rgba(255,255,255,0.35)' },
      { gradient: '#B5179E', quoteColor: '#fff', metaColor: 'rgba(255,255,255,0.7)', decoColor: 'rgba(255,255,255,0.12)', ruleColor: 'rgba(255,255,255,0.35)' },
      { gradient: '#1A1208', quoteColor: '#F5F0E8', metaColor: 'rgba(245,240,232,0.6)', decoColor: 'rgba(255,255,255,0.09)', ruleColor: 'rgba(245,240,232,0.3)' },
      { gradient: '#D62828', quoteColor: '#fff', metaColor: 'rgba(255,255,255,0.7)', decoColor: 'rgba(255,255,255,0.12)', ruleColor: 'rgba(255,255,255,0.35)' },
    ];

    /* Tracks the last palette index so reshuffle always picks a different one */
    let lastPaletteIndex = -1;

    /* --------------------------------------------------
       applyPalette(index)
       Applies a palette from POSTER_PALETTES to the poster.
       Pass a specific index, or -1 to pick a random one.
    -------------------------------------------------- */

    /* --------------------------------------------------
       onPickerChange(hex)
       Called when the native colour picker value changes.
       Syncs the hex input and swatch color.
    -------------------------------------------------- */
    function onPickerChange(hex) {
      document.getElementById('hex-input').value = hex;
      document.getElementById('colour-swatch').style.background = hex;
    }

    /* --------------------------------------------------
       onHexInput(val)
       Called as the user types in the hex field.
       Validates and syncs picker + swatch live.
    -------------------------------------------------- */
    function onHexInput(val) {
      // Auto-prepend # if missing
      if (val.length > 0 && val[0] !== '#') {
        val = '#' + val;
        document.getElementById('hex-input').value = val;
      }
      // Only sync when we have a full valid hex
      if (/^#([0-9A-Fa-f]{6})$/.test(val)) {
        document.getElementById('colour-picker').value = val;
        document.getElementById('colour-swatch').style.background = val;
      }
    }

    /* --------------------------------------------------
       applyCustomColour()
       Reads the hex input and applies it to the poster,
       auto-detecting whether to use light or dark text.
    -------------------------------------------------- */
    function applyCustomColour() {
      const hex = document.getElementById('hex-input').value.trim();
      if (!/^#([0-9A-Fa-f]{6})$/.test(hex)) {
        // Flash the input red if invalid
        const inp = document.getElementById('hex-input');
        inp.style.borderColor = 'var(--accent)';
        setTimeout(() => inp.style.borderColor = 'var(--border)', 1500);
        return;
      }

      /* Auto-detect luminance to pick white or dark text */
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      // Perceived luminance formula
      const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      const isDark = lum < 0.55;

      const quoteColor = isDark ? '#fff' : '#1A0A00';
      const metaColor = isDark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.5)';
      const decoColor = isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.1)';
      const ruleColor = isDark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.2)';

      const poster = document.getElementById('poster-preview');
      poster.style.background = hex;
      document.getElementById('preview-quote').style.color = quoteColor;
      document.querySelector('.poster-deco').style.color = decoColor;
      document.querySelector('.poster-rule').style.background = ruleColor;
      document.querySelector('.poster-attribution').style.color = metaColor;
      document.getElementById('preview-book').style.color = quoteColor;
    }

    function applyPalette(forceIndex = -1) {
      let idx;
      if (forceIndex >= 0) {
        idx = forceIndex;
      } else {
        do { idx = Math.floor(Math.random() * POSTER_PALETTES.length); }
        while (idx === lastPaletteIndex && POSTER_PALETTES.length > 1);
      }
      lastPaletteIndex = idx;

      const p = POSTER_PALETTES[idx];
      const poster = document.getElementById('poster-preview');
      poster.style.background = p.gradient;
      document.getElementById('preview-quote').style.color = p.quoteColor;
      document.querySelector('.poster-deco').style.color = p.decoColor;
      document.querySelector('.poster-rule').style.background = p.ruleColor;
      document.querySelector('.poster-attribution').style.color = p.metaColor;
      document.getElementById('preview-book').style.color = p.quoteColor;
    }

        /* QUOTE_FONTS — add/remove fonts here */
    const QUOTE_FONTS = [
      { label: 'Playfair',  family: "'Playfair Display', serif",     style: 'italic', weight: '400' },
      { label: 'Cormorant', family: "'Cormorant Garamond', serif",    style: 'italic', weight: '600' },
      { label: 'DM Sans',   family: "'DM Sans', sans-serif",          style: 'normal', weight: '300' },
      { label: 'Jakarta',   family: "'Plus Jakarta Sans', sans-serif", style: 'normal', weight: '400' },
      { label: 'Syne',      family: "'Syne', sans-serif",             style: 'normal', weight: '400' },
    ];

    let activeFontIndex = 0;

    function buildFontPills() {
      const container = document.getElementById('font-pills');
      container.innerHTML = '';
      QUOTE_FONTS.forEach((font, i) => {
        const btn = document.createElement('button');
        btn.textContent = font.label;
        btn.dataset.index = i;
        btn.style.cssText = `
          padding: 7px 14px;
          border-radius: 999px;
          border: 1.5px solid var(--border);
          background: ${i === activeFontIndex ? 'var(--ink)' : 'transparent'};
          color: ${i === activeFontIndex ? 'var(--bg)' : 'var(--ink-muted)'};
          font-family: ${font.family};
          font-style: ${font.style};
          font-size: 0.88rem;
          cursor: pointer;
          transition: all 0.15s;
          white-space: nowrap;
        `;
        btn.onclick = () => applyFont(i);
        container.appendChild(btn);
      });
    }

    function applyFont(index) {
      activeFontIndex = index;
      const font = QUOTE_FONTS[index];
      const quoteEl = document.getElementById('preview-quote');
      quoteEl.style.fontFamily = font.family;
      quoteEl.style.fontStyle  = font.style;
      quoteEl.style.fontWeight = font.weight;

      document.querySelectorAll('#font-pills button').forEach((btn, i) => {
        btn.style.background  = i === index ? 'var(--ink)' : 'transparent';
        btn.style.color       = i === index ? 'var(--bg)'  : 'var(--ink-muted)';
        btn.style.borderColor = i === index ? 'var(--ink)' : 'var(--border)';
      });
    }

    function generatePoster() {
      const book = document.getElementById('book-name').value.trim();
      const author = document.getElementById('author-name').value.trim();
      const quote = document.getElementById('quote-text').value.trim();

      /* --- Basic validation: all fields required --- */
      if (!book || !author || !quote) {
        highlightEmptyFields(book, author, quote);
        return;
      }

      /* --- Inject content into poster preview --- */
      document.getElementById('preview-quote').textContent = '\u201c' + quote + '\u201d';
      document.getElementById('preview-book').textContent = book;
      document.getElementById('preview-author').textContent = '\u2014 ' + author;

      /* --- Apply a random vibrant palette --- */
      applyPalette();

      /* --- Open the modal --- */
      document.getElementById('modal').classList.add('active');
        buildFontPills();
        applyFont(activeFontIndex);
      document.body.style.overflow = 'hidden';
    }


    /* --------------------------------------------------
       highlightEmptyFields()
       Adds a red border to any input that is empty,
       then removes it after 1.5 seconds.
    -------------------------------------------------- */
    function highlightEmptyFields(book, author, quote) {
      const fields = [
        { val: book, id: 'book-name' },
        { val: author, id: 'author-name' },
        { val: quote, id: 'quote-text' },
      ];

      fields.forEach(({ val, id }) => {
        if (!val) {
          const el = document.getElementById(id);
          el.style.borderColor = '#C2400C';
          el.style.boxShadow = '0 0 0 3px rgba(194,64,12,0.15)';
          setTimeout(() => {
            el.style.borderColor = '';
            el.style.boxShadow = '';
          }, 1500);
        }
      });
    }


    /* --------------------------------------------------
       closeModal()
       Hides the modal overlay.
    -------------------------------------------------- */
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.body.style.overflow = ''; // restore scroll
    }


    /* --------------------------------------------------
       closeOnBackdrop()
       Closes modal when user clicks the dark overlay,
       but NOT when clicking inside the white card.
    -------------------------------------------------- */
    function closeOnBackdrop(event) {
      if (event.target === document.getElementById('modal')) {
        closeModal();
      }
    }


    /* --------------------------------------------------
       downloadPoster()
       Uses html2canvas to capture the #poster-preview div
       and triggers a PNG download.

       To change the output filename, edit the string
       passed to anchor.download below.
    -------------------------------------------------- */
    function downloadPoster() {
      const poster = document.getElementById('poster-preview');
      const btn = document.querySelector('.btn-download');

      /* Update button state while rendering */
      btn.textContent = 'Preparing…';
      btn.disabled = true;

      html2canvas(poster, {
        scale: 3,              // 3× resolution for crisp PNG — lower to 2 if slow
        useCORS: true,
        backgroundColor: null,
        logging: false,
      }).then(canvas => {

        /* Build a download link and click it programmatically */
        const anchor = document.createElement('a');
        anchor.download = 'quote-poster.png'; // ← edit filename here
        anchor.href = canvas.toDataURL('image/png');
        anchor.click();

        /* Restore button */
        btn.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download as PNG`;
        btn.disabled = false;

      }).catch(err => {
        console.error('Export failed:', err);
        btn.textContent = 'Try Again';
        btn.disabled = false;
      });
    }


    /* --------------------------------------------------
       Keyboard accessibility — close modal on Escape key
    -------------------------------------------------- */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });

  </script>
</body>
